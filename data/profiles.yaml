version: 1

# Curated profiles. Each profile pins an MC version because content mods
# lag the latest release by months — pinning means "Update" upgrades mods
# *within* this MC version and never silently breaks the kid's setup.
#
# To add a profile, copy one and change the slugs. The Modrinth slug is
# the last segment of the project's URL (modrinth.com/mod/<slug>).
#
# Sources supported:
#   modrinth         — { source: modrinth, slug: <slug> }
#   url / planetminecraft / curseforge_url
#                    — { source: url, url: "<direct-download-url>",
#                        filename: "<saved-as>.jar|.zip" }
#                    No version check, no auto-update — bumps require
#                    editing the URL.

profiles:
  - id: performance-edge
    name: Bleeding Edge Performance
    short_description: Always the latest Minecraft release — auto-resolves at install
    minecraft_version: latest  # sentinel; resolved from Mojang manifest each install
    loader: fabric
    color: "#00bfa5"
    accent: speed
    icon: Diamond_Block
    mods:
      - { source: modrinth, slug: fabric-api,             role: required }
      - { source: modrinth, slug: sodium,                 role: performance }
      - { source: modrinth, slug: sodium-extra,           role: performance }
      - { source: modrinth, slug: reeses-sodium-options,  role: ui }
      - { source: modrinth, slug: lithium,                role: performance }
      - { source: modrinth, slug: ferrite-core,           role: performance }
      - { source: modrinth, slug: entityculling,          role: performance }
      - { source: modrinth, slug: immediatelyfast,        role: performance }
      - { source: modrinth, slug: modernfix,              role: performance }
      - { source: modrinth, slug: iris,                   role: shaders }
      - { source: modrinth, slug: yacl,                   role: required }
      - { source: modrinth, slug: modmenu,                role: ui }
      - { source: modrinth, slug: jei,                    role: ui }
      - { source: modrinth, slug: jade,                   role: ui }
      - { source: modrinth, slug: xaeros-minimap,         role: ui }
      - { source: modrinth, slug: appleskin,              role: ui }
      - { source: modrinth, slug: continuity,             role: visual }
      - { source: modrinth, slug: lambdynamiclights,      role: visual }
    resource_packs:
      - { source: modrinth, slug: faithful-64x, default: true }

  # ----- Modpack profiles (Modrinth-hosted .mrpack) -----
  # These pin their own MC + loader via the .mrpack manifest, so we don't
  # set minecraft_version / loader / mods here. The installer reads the
  # manifest at install time and fetches every dep automatically.

  - id: rising-legends
    name: Rising Legends
    short_description: RLCraft-inspired survival fantasy on Fabric — dragons, dungeons, deadly mobs
    modpack: { source: modrinth-modpack, slug: rl-craft }
    color: "#a02828"
    icon: TNT
    java_xmx_gb: 8
    # The .mrpack manifest doesn't ship FTB Teams Fabric (CurseForge-only),
    # but Rising Legends declares it as a hard dependency. Pin by file_id.
    modpack_supplements:
      - { source: curseforge, file_id: 6130783, filename: ftb-teams-fabric-2001.3.1.jar }

  - id: prominence-2
    name: Prominence II RPG
    short_description: Hasturian Era — questing RPG with magic, classes, and dimensions
    modpack: { source: modrinth-modpack, slug: prominence-2-fabric }
    color: "#7c2c5c"
    icon: Enchanting_Table
    java_xmx_gb: 8

  - id: homestead
    name: Homestead
    short_description: Cozy farming and homemaking modpack
    modpack: { source: modrinth-modpack, slug: homestead }
    color: "#6b8e23"
    icon: Cake
    java_xmx_gb: 6
    # Homestead's .mrpack manifest doesn't ship the FTB mods at all — the
    # pack expects CozyStudiosCore to fetch them at runtime via CurseForge,
    # which doesn't work in our Modrinth-only flow. The seven mods below are
    # the ones the pack's `config/cozystudioscore/auto_ftb_mods.json` asks
    # for. `source: curseforge` resolves to forgecdn at install time —
    # find each file_id at curseforge.com/.../<slug>/files/<file_id>.
    # When Homestead bumps to a newer release, refresh these in lockstep.
    modpack_supplements:
      - { source: curseforge, file_id: 7296747, filename: ftb-library-fabric-2001.2.12.jar }
      - { source: curseforge, file_id: 7499808, filename: ftb-teams-fabric-2001.3.2.jar }
      - { source: curseforge, file_id: 7609946, filename: ftb-essentials-fabric-2001.2.4.jar }
      - { source: curseforge, file_id: 7909593, filename: ftb-quests-fabric-2001.4.21.jar }
      - { source: curseforge, file_id: 4926069, filename: ftb-filter-system-fabric-1.0.2.jar }
      - { source: curseforge, file_id: 6402485, filename: ftb-xmod-compat-fabric-2.1.3.jar }
      - { source: curseforge, file_id: 5698979, filename: questsadditions-fabric-1.20.1-1.4.6.jar }

  - id: arcane-dragons
    name: Arcane Dragons
    short_description: Dragon-themed magic and adventure on Fabric
    modpack: { source: modrinth-modpack, slug: arcanedragons }
    color: "#5a3a8e"
    icon: Bookshelf
    java_xmx_gb: 8

  - id: dragon-realm
    name: Dragon Realm
    short_description: Dragon-rider fantasy modpack on Fabric
    modpack: { source: modrinth-modpack, slug: dragon-realm }
    color: "#c66f1f"
    icon: Carved_Pumpkin
    java_xmx_gb: 8

  - id: adventure-content
    name: Adventure with Cobblemon and Create
    short_description: Pokémon-style creatures, mechanical contraptions, exploration
    minecraft_version: "1.21.1"
    loader: neoforge
    color: "#ff6f00"
    accent: adventure
    icon: Pumpkin
    java_xmx_gb: 10  # big modpack — bumps the auto-detected default
    mods:
      - { source: modrinth, slug: kotlin-for-forge, role: required }   # Cobblemon language provider
      - { source: modrinth, slug: cobblemon,        role: content }
      - { source: modrinth, slug: create,           role: content }
      - { source: modrinth, slug: jei,              role: ui }
      - { source: modrinth, slug: jade,             role: ui }
      - { source: modrinth, slug: xaeros-minimap,   role: ui }
      - { source: modrinth, slug: appleskin,        role: ui }
      - { source: modrinth, slug: geckolib,         role: required }

  - id: morpho
    name: Morpho
    short_description: Turn into any creature — Identity morphing across Alex's Mobs' 85+ animals
    minecraft_version: "1.21.1"
    loader: neoforge
    color: "#3b6dd8"
    icon: Carved_Pumpkin
    java_xmx_gb: 8
    # Slug notes:
    #   identity            — original Draylar mod, FABRIC ONLY. Don't use.
    #   identity-fix        — cross-loader fork; ships a NeoForge 1.21.1 build.
    #   alexs-mobs          — official; caps at 1.20.1.
    #   alexs-mobs(1.21.1)  — Raguto's community port for NeoForge 1.21.1.
    #                         Requires its OWN port of Citadel (paren slug below).
    # If/when the official Alex's Mobs ships 1.21.1, swap to slug `alexs-mobs`
    # + `citadel` and drop the (1.21.1-port) versions.
    mods:
      - { source: modrinth, slug: identity-fix,           role: content }
      - { source: modrinth, slug: "alexs-mobs(1.21.1)",   role: content }
      - { source: modrinth, slug: "citadel-(1.21.1-port)", role: required }   # Alex's Mobs port dep
      - { source: modrinth, slug: architectury-api,       role: required }   # Identity Fix dep
      - { source: modrinth, slug: gabous-libs,            role: required }   # Identity Fix dep
      - { source: modrinth, slug: geckolib,               role: required }
      - { source: modrinth, slug: jei,                    role: ui }
      - { source: modrinth, slug: jade,                   role: ui }
      - { source: modrinth, slug: xaeros-minimap,         role: ui }
      - { source: modrinth, slug: appleskin,              role: ui }

  - id: backyard-naturalist
    name: Backyard Naturalist
    short_description: Wildlife and bugs — Naturalist plus butterflies, dragonflies, jumping spiders
    minecraft_version: "1.21.1"
    loader: neoforge
    color: "#4a8b3a"
    icon: Mycelium
    java_xmx_gb: 6
    # Combo: Naturalist (mammals/reptiles/amphibians/some bugs like fireflies)
    # + Critters and Companions (dragonflies, leaf insects, jumping spiders,
    # otters, etc.) + Bok's Banging Butterflies (butterfly + moth life cycles
    # with nets, jars, and pollination).
    mods:
      - { source: modrinth, slug: naturalist,             role: content }
      - { source: modrinth, slug: critters-and-companions, role: content }
      - { source: modrinth, slug: boks-butterflies,       role: content }
      - { source: modrinth, slug: geckolib,               role: required }   # Naturalist animations
      - { source: modrinth, slug: jei,                    role: ui }
      - { source: modrinth, slug: jade,                   role: ui }
      - { source: modrinth, slug: xaeros-minimap,         role: ui }
      - { source: modrinth, slug: appleskin,              role: ui }
