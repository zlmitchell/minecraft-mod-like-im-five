name: Release

# release-please watches main for conventional commits and opens a release PR
# that bumps Cargo.toml + writes CHANGELOG.md. Merging that PR creates a tag
# and GitHub Release; we then build the Windows exe and attach it.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Generate placeholder icons
        run: pwsh ./scripts/gen-icons.ps1
        shell: pwsh

      - name: Build exe
        working-directory: src-tauri
        run: cargo build --release

      - name: Attach exe to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} `
            src-tauri/target/release/minecraft-mod-like-im-five.exe
