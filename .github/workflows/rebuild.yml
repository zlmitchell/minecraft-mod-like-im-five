name: Rebuild bundles

# Manually re-run the cross-platform matrix for an EXISTING release. Use
# this to backfill bundles when an older release is missing macOS/Linux
# binaries (e.g., when the release was cut before the matrix existed).
#
# Trigger from the Actions tab → Rebuild bundles → Run workflow → enter tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach bundles to (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.r.outputs.release_id }}
    steps:
      - name: Look up release ID for tag
        id: r
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ inputs.tag }} --jq .id)
          echo "release_id=$ID" >> $GITHUB_OUTPUT

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Regenerate icons in proper platform formats
        run: npx tauri icon src-tauri/icons/icon.png

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.resolve.outputs.release_id }}
          args: ${{ matrix.args }}
